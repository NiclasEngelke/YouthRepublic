.sheet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.sheet-contact{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:10px 6px;border-radius:14px}.sheet-contact:active{background:rgba(0,0,0,0.04)}.sheet-contact .avatar{width:54px;height:54px;font-size:17px}
.sheet-cname{font-size:12.5px;font-weight:600;color:#1a1a2e}.cancel-btn{margin-top:16px;width:100%;padding:13px;border-radius:14px;border:none;background:rgba(0,0,0,0.04);font-family:inherit;font-size:15px;font-weight:600;color:rgba(30,30,60,0.4);cursor:pointer}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,50,0.85);backdrop-filter:blur(20px);color:#fff;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:200;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes slideDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:420px){body{background:none}.phone{width:100%;height:100%;border-radius:0;box-shadow:none}}





.card-preview{position:relative;width:100%;aspect-ratio:1.586;border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.12),0 12px 40px rgba(0,0,0,0.08)}
.card-bg{position:absolute;inset:0;background:linear-gradient(135deg,#1a1a2e 0%,#2d2d44 100%);background-size:cover;background-position:center}
.card-chip{position:absolute;left:20px;top:50%;transform:translateY(-50%);width:36px;height:28px;border-radius:5px;background:linear-gradient(135deg,#e8d5a3,#c9a84c);box-shadow:inset 0 1px 2px rgba(255,255,255,0.4),inset 0 -1px 2px rgba(0,0,0,0.15)}
.card-chip::after{content:'';position:absolute;inset:3px;border-radius:3px;border:1px solid rgba(180,150,80,0.4)}
.card-logo{position:absolute;top:18px;left:20px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:rgba(255,255,255,0.85);letter-spacing:0.3px}
.card-designs{display:flex;flex-direction:column;gap:8px}
.card-designs-title{font-size:11px;font-weight:700;color:rgba(30,30,60,0.4);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px}
.card-design-grid{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:4px}

.card-design-opt{flex-shrink:0;width:72px;height:46px;border-radius:10px;cursor:pointer;overflow:hidden;border:2px solid transparent;transition:border-color .2s,transform .15s;position:relative}
.card-design-opt:active{transform:scale(.93)}
.card-design-opt.active{border-color:#1a1a2e;box-shadow:0 0 0 1px #1a1a2e}
.card-design-opt img,.card-design-opt .cdo-fill{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;pointer-events:none}

.card-design-opt.locked{opacity:.5;position:relative}
.card-design-opt.locked::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.3);border-radius:8px;pointer-events:none}
.cdo-lock{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;gap:1px;pointer-events:none}
.cdo-lock svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
.cdo-lock span{font-size:7.5px;font-weight:700;color:#fff;letter-spacing:0.3px}
.card-upload{flex-shrink:0;width:72px;height:46px;border-radius:10px;border:2px dashed rgba(60,70,100,0.25);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s}
.card-upload:active{border-color:rgba(0,0,0,0.25)}
.card-upload svg{width:20px;height:20px;stroke:rgba(30,30,60,0.3);fill:none;stroke-width:1.8}

.edu-news{margin-bottom:18px}
.edu-news-title{font-size:11px;font-weight:700;color:rgba(30,30,60,0.4);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.edu-news-scroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.edu-news-scroll::-webkit-scrollbar{display:none}
.edu-news-card{flex-shrink:0;width:200px;border-radius:14px;overflow:hidden;background:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.5);box-shadow:inset 0 1px 0 rgba(255,255,255,0.6),0 2px 8px rgba(0,0,0,0.04);cursor:pointer}

.edu-news-body{padding:10px 12px}

.badge-preview{display:flex;gap:12px;align-items:center;padding:14px 16px;border-radius:14px;background:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.5);box-shadow:inset 0 1px 0 rgba(255,255,255,0.6),0 2px 8px rgba(0,0,0,0.04);cursor:pointer;margin-bottom:16px}

.badge-preview-icons{display:flex;gap:14px;flex-shrink:0}

.badge-preview-label{font-size:13px;font-weight:600;color:rgba(20,20,50,0.7)}
.badge-preview-label span{font-weight:400;opacity:0.5}
.badge-preview-arrow{margin-left:auto;font-size:16px;opacity:0.3}
.chall-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.chall-card{padding:16px 12px;border-radius:16px;background:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.5);box-shadow:inset 0 1px 0 rgba(255,255,255,0.6),0 2px 8px rgba(0,0,0,0.04);text-align:center;position:relative}

.chall-card-img{width:56px;height:56px;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.18));margin-bottom:8px}

.chall-card-name{font-size:12px;font-weight:700;color:rgba(20,20,50,0.85);line-height:1.3}
.chall-card-desc{font-size:10px;color:rgba(30,30,60,0.4);margin-top:2px;line-height:1.3}
.edu-path{position:relative;padding:0 0 30px}
.edu-step{position:relative;display:flex;align-items:center;gap:12px;padding:10px 0;margin-bottom:4px}
.edu-step.left{flex-direction:row;padding-left:0;padding-right:40px}
.edu-step.right{flex-direction:row-reverse;padding-right:0;padding-left:40px}

.edu-node{width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;box-shadow:0 3px 12px rgba(0,0,0,0.08)}
.edu-node.completed{background:rgba(23,238,65,0.18);border:2px solid rgba(23,238,65,0.45)}
.edu-node.current{background:rgba(23,238,65,0.12);border:2.5px solid rgba(23,238,65,0.4);animation:edu-pulse 2s infinite}
.edu-node.locked{background:rgba(0,0,0,0.03);border:2px solid rgba(0,0,0,0.07)}
.edu-node.locked .edu-node-icon{opacity:.25;filter:grayscale(1)}
.edu-node.locked .icon-3d{opacity:.2;filter:grayscale(1)}
.edu-node-badge{position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.edu-node-badge.done{background:#17EE41;color:#fff}
.edu-node-badge.star{background:linear-gradient(135deg,#17EE41,#0abf30);color:#fff}
.edu-node-badge.num{background:rgba(0,0,0,0.08);color:rgba(30,30,60,0.3);font-size:9px}
.edu-card{flex:1;border-radius:14px;padding:11px 14px;background:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.5);box-shadow:inset 0 1px 0 rgba(255,255,255,0.6),0 2px 8px rgba(0,0,0,0.04);cursor:pointer;transition:opacity .15s}
.edu-card:active{opacity:.7}
.edu-card.locked{opacity:.4;cursor:default}
.edu-card-title{font-size:14px;font-weight:700;color:rgba(20,20,50,0.85)}
.edu-card-sub{font-size:11px;color:rgba(30,30,60,0.4);margin-top:1px;font-weight:500}
.edu-card-progress{height:4px;border-radius:2px;background:rgba(0,0,0,0.06);margin-top:7px;overflow:hidden}
.edu-card-progress-fill{height:100%;border-radius:2px}
.edu-card-progress-fill.green{background:linear-gradient(90deg,#17EE41,#30d158)}
.edu-card-progress-fill.blue{background:linear-gradient(90deg,#17EE41,#0abf30)}

.edu-level-label{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);font-size:8.5px;font-weight:700;color:rgba(30,30,60,0.45);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.edu-node.completed .edu-level-label{color:rgba(23,238,65,0.7)}
.edu-node.current .edu-level-label{color:rgba(23,238,65,0.8)}
@keyframes edu-pulse{0%,100%{box-shadow:0 3px 12px rgba(0,0,0,0.08),0 0 0 0 rgba(23,238,65,0.2)}50%{box-shadow:0 3px 12px rgba(0,0,0,0.08),0 0 0 8px rgba(23,238,65,0)}}

.app-fullscreen{position:absolute;inset:0;z-index:50;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);background:#ffffff;display:flex;flex-direction:column;padding:54px 16px 34px;transform:translateY(100%);opacity:0;transition:transform .4s cubic-bezier(.32,.72,0,1),opacity .3s;pointer-events:none;overflow:hidden}
.app-fullscreen.open{transform:translateY(0);opacity:1;pointer-events:all}
.app-fullscreen .fs-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.app-fullscreen .fs-scroll::-webkit-scrollbar{display:none}
.app-fullscreen .sub-view{position:absolute;inset:0;padding:54px 16px 34px;display:flex;flex-direction:column;background:rgba(248,248,252,1);z-index:20;transform:translateX(100%);opacity:0;transition:transform .35s cubic-bezier(.32,.72,0,1),opacity .25s;pointer-events:none}
.app-fullscreen .sub-view.active{transform:translateX(0);opacity:1;pointer-events:all}

.edu-node-3d{width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;perspective:120px}
.edu-node-3d .icon-3d{width:40px;height:40px;position:relative;animation:float3d 3s ease-in-out infinite;transform-style:preserve-3d}
.edu-node-3d .icon-3d svg{width:100%;height:100%;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.15))}
.edu-step:nth-child(2n) .icon-3d{animation-delay:-0.5s}
.edu-step:nth-child(3n) .icon-3d{animation-delay:-1s}
.edu-step:nth-child(4n) .icon-3d{animation-delay:-1.5s}
.edu-step:nth-child(5n) .icon-3d{animation-delay:-2s}
@keyframes float3d{0%,100%{transform:translateY(0) rotateY(0deg) rotateX(0deg)}25%{transform:translateY(-4px) rotateY(8deg) rotateX(3deg)}50%{transform:translateY(-2px) rotateY(0deg) rotateX(-2deg)}75%{transform:translateY(-5px) rotateY(-8deg) rotateX(2deg)}}
.icon-3d .i3d-main{fill:url(#grad-main)}.icon-3d .i3d-accent{fill:url(#grad-accent)}.icon-3d .i3d-shine{fill:url(#grad-shine)}.icon-3d .i3d-dark{fill:url(#grad-dark)}
.icon-3d .i3d-stroke{fill:none;stroke:url(#grad-accent);stroke-width:1.5}

.qr-screen{display:flex;flex-direction:column;align-items:center;height:100%}

.qr-card{width:100%;max-width:300px;border-radius:22px;padding:24px;background:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.6);box-shadow:inset 0 2px 0 rgba(255,255,255,0.7),0 8px 32px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;margin-bottom:20px}

.amt-header{padding:0 4px;margin-bottom:auto}
.amt-title{font-size:26px;font-weight:700;color:rgba(20,20,50,0.88)}
.amt-avail{font-size:13px;font-weight:500;color:rgba(30,30,60,0.35);margin-top:3px}

.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}

.chat-action-pill:active{opacity:.7}
.chat-action-pill.blue{background:#1a1a2e;color:#fff;border:none}

.settings-products{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.settings-product{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:18px;position:relative;overflow:hidden;border-top:1.5px solid rgba(255,255,255,0.35);border-left:1px solid rgba(255,255,255,0.2);border-right:1px solid rgba(255,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.05);box-shadow:inset 0 2px 2px rgba(255,255,255,0.25),inset 2px 0 2px rgba(255,255,255,0.1),inset -1px 0 2px rgba(0,0,0,0.05),inset 0 -2px 4px rgba(0,0,0,0.12),0 2px 4px rgba(0,0,0,0.08),0 6px 16px rgba(0,0,0,0.1),0 12px 32px rgba(0,0,0,0.06)}

/* === ANIMATION SYSTEM === Toggle via ANIM config object in JS === */

/* 1. Numpad key pop */
.anim-enabled .numpad-key:active{transform:scale(0.88);transition:transform 0.08s}
.anim-enabled .amt-display{transition:transform 0.12s cubic-bezier(.34,1.56,.64,1)}
.anim-enabled .amt-display.pop{transform:scale(1.06)}

/* 2. Success checkmark after transfer */
@keyframes checkDraw{from{stroke-dashoffset:48}to{stroke-dashoffset:0}}
@keyframes checkCircle{from{stroke-dashoffset:166}to{stroke-dashoffset:0}}
@keyframes checkFade{0%{opacity:0;transform:scale(0.6)}50%{opacity:1;transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
.success-overlay{position:absolute;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);opacity:0;pointer-events:none}
.success-overlay.show{opacity:1;pointer-events:all}
.success-check{animation:checkFade 0.4s cubic-bezier(.34,1.56,.64,1) forwards}
.success-check circle{stroke-dasharray:166;stroke-dashoffset:166;animation:checkCircle 0.5s 0.2s ease forwards}
.success-check path{stroke-dasharray:48;stroke-dashoffset:48;animation:checkDraw 0.3s 0.5s ease forwards}

/* 3. Parallax tilt on bank card */
.anim-enabled .card-3d-wrap{transition:transform 0.15s ease-out}

/* 4. Staggered education steps - fly in from sides */
@keyframes stepFromLeft{0%{opacity:0;transform:translateX(-80px) scale(0.92)}100%{opacity:1;transform:translateX(0) scale(1)}}
@keyframes stepFromRight{0%{opacity:0;transform:translateX(80px) scale(0.92)}100%{opacity:1;transform:translateX(0) scale(1)}}
.anim-enabled .edu-step{opacity:0}
.anim-enabled .edu-step.left.ani-in{animation:stepFromLeft 0.5s cubic-bezier(.22,1,.36,1) forwards}
.anim-enabled .edu-step.right.ani-in{animation:stepFromRight 0.5s cubic-bezier(.22,1,.36,1) forwards}

/* 5. Contact stagger in send sheet */
@keyframes contactIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim-enabled .sheet-contact{opacity:0}
.anim-enabled .sheet-contact.ani-in{animation:contactIn 0.25s ease forwards}

/* 6. Animated balance counter - CSS handled by JS */

/* 7. Analytics chart animations */
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.anim-enabled .ana-bar{transform-origin:bottom;transform:scaleY(0)}
.anim-enabled .ana-bar.ani-in{animation:barGrow 0.4s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes donutDraw{from{stroke-dashoffset:var(--circumference)}to{stroke-dashoffset:var(--final-offset)}}

/* 8. Tab icon bounce */
@keyframes tabBounce{0%{transform:scale(1)}40%{transform:scale(1.25)}70%{transform:scale(0.92)}100%{transform:scale(1)}}
.anim-enabled .nav-tab .tab-icon.bounce{animation:tabBounce 0.35s cubic-bezier(.34,1.56,.64,1)}

/* 9. Staggered edu news cards */
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.anim-enabled .edu-news-card{opacity:0}
.anim-enabled .edu-news-card.ani-in{animation:slideInRight 0.3s ease forwards}

/* 10. Zinsen count-up handled by JS */


/* 11. Superhero card design change - jump + triple salto + dust landing */
@keyframes heroLift{
0%{transform:translateY(0) scale(1)}
4%{transform:translateY(12px) scale(1.05,0.9)}
25%{transform:translateY(-500px) scale(0.94,1.08)}
30%{transform:translateY(-500px) scale(1)}
38%{transform:translateY(-500px) scale(1)}
50%{transform:translateY(-400px) scale(1)}
70%{transform:translateY(-80px) scale(1)}
82%{transform:translateY(0px) scale(1.08,0.88)}
90%{transform:translateY(-12px) scale(0.97,1.04)}
100%{transform:translateY(0) scale(1)}
}
@keyframes heroSpin{
0%{transform:rotateX(0deg)}
25%{transform:rotateX(0deg)}
55%{transform:rotateX(1080deg)}
100%{transform:rotateX(1080deg)}
}
.anim-enabled .card-3d-wrap.hero-jump{animation:heroLift 3s cubic-bezier(.22,1,.36,1) forwards!important;transition:none!important}
.anim-enabled .card-3d-wrap.hero-jump .card-3d-inner{animation:heroSpin 3s cubic-bezier(.4,0,.2,1) forwards!important;transition:none!important}
.card-3d-wrap.hero-jump~.hero-dust{z-index:50}
.app-fullscreen:has(.hero-jump){overflow:visible!important}
.app-fullscreen:has(.hero-jump) .fs-scroll{overflow:visible!important}

/* Dust/smoke particles - timed to landing at ~85% of 2.2s */
@keyframes dustL{0%,82%{opacity:0;transform:translate(0,0) scale(0)}90%{opacity:0.7;transform:translate(-45px,-15px) scale(1.1)}100%{opacity:0;transform:translate(-75px,-35px) scale(1.6)}}
@keyframes dustR{0%,82%{opacity:0;transform:translate(0,0) scale(0)}90%{opacity:0.7;transform:translate(45px,-15px) scale(1.1)}100%{opacity:0;transform:translate(75px,-35px) scale(1.6)}}
@keyframes dustC{0%,82%{opacity:0;transform:translate(0,0) scale(0)}90%{opacity:0.8;transform:translate(0,-25px) scale(1.3)}100%{opacity:0;transform:translate(0,-55px) scale(1.8)}}
@keyframes dustGround{0%,80%{opacity:0;transform:scaleX(0.2) scaleY(0.1)}89%{opacity:0.5;transform:scaleX(1.5) scaleY(0.4)}100%{opacity:0;transform:scaleX(2.8) scaleY(0)}}
@keyframes shockwave{0%,83%{opacity:0;transform:scale(0)}92%{opacity:0.35;transform:scale(0.5)}100%{opacity:0;transform:scale(2)}}
.hero-dust{position:absolute;pointer-events:none;z-index:50}
.hero-dust .dp{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(180,180,180,0.7),rgba(120,120,120,0.2))}
.hero-dust .dp.l1{width:18px;height:18px;animation:dustL 3s ease-out forwards}
.hero-dust .dp.l2{width:12px;height:12px;animation:dustL 3s 0.06s ease-out forwards}
.hero-dust .dp.r1{width:18px;height:18px;animation:dustR 3s ease-out forwards}
.hero-dust .dp.r2{width:12px;height:12px;animation:dustR 3s 0.06s ease-out forwards}
.hero-dust .dp.c1{width:22px;height:22px;animation:dustC 3s ease-out forwards}
.hero-dust .dp.c2{width:14px;height:14px;animation:dustC 3s 0.1s ease-out forwards}
.hero-dust .ring{position:absolute;width:120px;height:120px;left:-60px;top:-60px;border-radius:50%;border:3px solid rgba(180,180,180,0.3);animation:shockwave 3s ease-out forwards}
.hero-dust .ground{position:absolute;width:200px;height:30px;left:-100px;top:-15px;background:radial-gradient(ellipse,rgba(160,160,160,0.4),transparent 70%);animation:dustGround 3s ease-out forwards}
</style>

<script>
/* === ANIMATION CONFIG — set any to false to disable === */
var ANIM={
  numpadPop:true,        /* 1. Numpad amount pop on keypress */
  successCheck:true,     /* 2. Checkmark animation after transfer */
  cardTilt:true,         /* 3. Parallax tilt on bank card */
  eduStagger:true,       /* 4. Staggered education node entrance */
  contactStagger:true,   /* 5. Contact stagger in send sheet */
  balanceCounter:true,   /* 6. Animated balance count-up */
  chartAnimate:true,     /* 7. Analytics bars/donut animation */
  tabBounce:true,        /* 8. Tab icon bounce on switch */
  eduNewsSlide:true,     /* 9. Edu news cards slide in */
  zinsenCounter:true,     /* 10. Zinsen amount count-up */
  heroCardFlip:true       /* 11. Superhero jump+salto on card design change */
};
(function(){if(Object.values(ANIM).some(Boolean))document.querySelector('.phone').classList.add('anim-enabled')})();

/* --- Animation helpers --- */
function animStagger(selector,cls,delay){
  if(!document.querySelector('.anim-enabled'))return;
  var els=document.querySelectorAll(selector);
  els.forEach(function(el,i){setTimeout(function(){el.classList.add(cls)},i*(delay||80))});
}
function animCountUp(el,target,duration,suffix){
  if(!el)return;
  duration=duration||800;suffix=suffix||'';
  var start=0,startTime=null;
  function step(ts){
    if(!startTime)startTime=ts;
    var p=Math.min((ts-startTime)/duration,1);
    var v=p<1?Math.round(start+(target-start)*p*100)/100:target;
    el.textContent=String(v).replace('.',',')+suffix;
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function showSuccessCheck(){
  var ov=document.getElementById('successOv');
  if(!ov)return;
  ov.classList.add('show');
  setTimeout(function(){ov.classList.remove('show')},1400);
}
function heroCardAnim(applyFn){
  var wrap=document.querySelector('.card-3d-wrap');
  if(!wrap||!ANIM.heroCardFlip){applyFn();return}
  if(wrap._heroActive)return;
  wrap._heroActive=true;
  /* Clear any inline transform from card tilt - this is critical! */
  wrap.style.transform='';
  wrap.style.transition='none';
  /* Temporarily allow overflow so card can jump above container */
  var fs=wrap.closest('.app-fullscreen');
  var scroll=wrap.closest('.fs-scroll');
  if(fs)fs.style.overflow='visible';
  if(scroll)scroll.style.overflow='visible';
  /* Add dust at card landing position - sibling so it stays while card jumps */
  var dust=document.createElement('div');
  dust.className='hero-dust';
  dust.innerHTML='<div class="dp l1"></div><div class="dp l2"></div><div class="dp r1"></div><div class="dp r2"></div><div class="dp c1"></div><div class="dp c2"></div><div class="ring"></div><div class="ground"></div>';
  var wrapRect=wrap.getBoundingClientRect();
  var parentRect=wrap.parentNode.getBoundingClientRect();
  dust.style.position='absolute';
  dust.style.top=(wrapRect.bottom-parentRect.top)+'px';
  dust.style.left='50%';
  dust.style.bottom='auto';
  wrap.parentNode.style.position='relative';
  wrap.parentNode.appendChild(dust);
  /* Force reflow then start animation */
  void wrap.offsetWidth;
  wrap.classList.add('hero-jump');
  /* Apply the design change while card is off-screen (at the top) */
  setTimeout(function(){applyFn()},900);
  /* Cleanup */
  setTimeout(function(){
    wrap.classList.remove('hero-jump');
    wrap.style.transform='';
    wrap.style.transition='';
    var inner=wrap.querySelector('.card-3d-inner');
    if(inner){inner.style.animation='';inner.style.transform=''}
    if(dust.parentNode)dust.parentNode.removeChild(dust);
    if(fs)fs.style.overflow='';
    if(scroll)scroll.style.overflow='';
    wrap._heroActive=false;
  },3300);
}

function genQR(){
var s=33,c=2,sz=s*c;
var svg='<svg viewBox="0 0 '+sz+' '+sz+'" xmlns="http://www.w3.org/2000/svg">';
var grid=[];
for(var y=0;y<s;y++){grid[y]=[];for(var x=0;x<s;x++)grid[y][x]=0}
function pat(ox,oy){for(var y=0;y<7;y++)for(var x=0;x<7;x++){if(y===0||y===6||x===0||x===6||(x>=2&&x<=4&&y>=2&&y<=4))grid[oy+y][ox+x]=1}}
pat(0,0);pat(s-7,0);pat(0,s-7);
for(var y=0;y<s;y++)for(var x=0;x<s;x++){
if(grid[y][x])continue;
var inFinder=(x<8&&y<8)||(x>=s-8&&y<8)||(x<8&&y>=s-8);
var inCenter=(x>=13&&x<=19&&y>=13&&y<=19);
if(!inFinder&&!inCenter){
var seed=(x*7+y*13+x*y)%17;
if(seed<7)grid[y][x]=1;
}}
for(var y=0;y<s;y++)for(var x=0;x<s;x++){
if(grid[y][x])svg+='<rect x="'+(x*c)+'" y="'+(y*c)+'" width="'+c+'" height="'+c+'" rx="0.4" fill="#1a1a2e"/>';
}
svg+='</svg>';return svg;
}

function sizeForAmt(amt,total,minR,maxR){
  return minR+Math.sqrt(amt/total)*(maxR-minR);
}

function placeBubbles(bubbles,total,minR,maxR){
  bubbles.sort(function(a,b){return b.amt-a.amt});
  bubbles.forEach(function(b){b.r=sizeForAmt(b.amt,total,minR,maxR)});
  var placed=[];
  var gap=5;
  bubbles.forEach(function(b,idx){
    if(idx===0){
      b.x=W/2;b.y=H/2;
      placed.push(b);return;
    }
    var bestX=W/2,bestY=H/2,found=false;
    for(var ring=0;ring<300&&!found;ring++){
      var radius=ring*2.5;
      var steps=Math.max(16,Math.floor(radius*1));
      for(var s=0;s<steps&&!found;s++){
        var angle=(s/steps)*Math.PI*2+(ring*0.7);
        var x=W/2+Math.cos(angle)*radius;
        var y=H/2+Math.sin(angle)*radius;
        if(y-b.r<2||y+b.r>H-2) continue;
        if(x-b.r<2||x+b.r>W-2) continue;
        var ok=true;
        for(var j=0;j<placed.length;j++){
          var p=placed[j];
          var dx=x-p.x,dy=y-p.y;
          var dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<b.r+p.r+gap){ok=false;break}
        }
        if(ok){bestX=x;bestY=y;found=true}
      }
    }
    if(!found){
      /* Fallback: place to the right, allow scroll */
      var rightMost=0;
      placed.forEach(function(p){if(p.x+p.r>rightMost)rightMost=p.x+p.r});
      bestX=rightMost+gap+b.r;
      bestY=H/2;
    }
    b.x=bestX;b.y=bestY;
    placed.push(b);
  });
  return bubbles;
}

function renderBubbles(bubbles,onClick){
  box.innerHTML='<div class="bubble-inner" id="bubbleInner"></div>';
  var inner=document.getElementById('bubbleInner');
  var total=0;
  bubbles.forEach(function(b){total+=b.amt});
  /* Scale bubbles to fit: max radius based on container and bubble count */
  var maxR=Math.min(H*0.28, W/(bubbles.length*0.9));
  var minR=Math.min(20, maxR*0.4);
  placeBubbles(bubbles,total,minR,maxR);
  /* Calculate required width */
  var maxRight=W;
  bubbles.forEach(function(b){
    var right=b.x+b.r+6;
    if(right>maxRight) maxRight=right;
  });
  inner.style.width=Math.max(W,maxRight)+'px';
  inner.style.height=H+'px';
  bubbles.forEach(function(b,i){
    var el=document.createElement('div');
    el.className='bubble entering';
    var fontSize=Math.max(10,Math.min(18,b.r*0.38));
    var labelSize=Math.max(7,Math.min(10,b.r*0.22));
    var grad='radial-gradient(circle at 38% 32%, rgba(255,255,255,0.15) 0%, transparent 50%)';
    el.style.cssText='width:'+(b.r*2)+'px;height:'+(b.r*2)+'px;left:'+(b.x-b.r)+'px;top:'+(b.y-b.r)+'px;background:'+grad+','+b.color;
    el.innerHTML='<span class="bubble-amt" style="font-size:'+fontSize+'px">'+b.amt+' \u20ac</span><span class="bubble-label" style="font-size:'+labelSize+'px">'+b.name+'</span>';
    if(onClick) el.onclick=function(e){e.stopPropagation();onClick(b)};
    inner.appendChild(el);
    var floatClass='float'+(i%3+1);
    setTimeout(function(){el.classList.remove('entering');el.classList.add(floatClass)},50+i*80);
  });
}

function renderCatList(items,title){
  catTitle.textContent=title||'Kategorien';
  var total=0;items.forEach(function(c){total+=c.amt});
  var html='';
  items.forEach(function(c){
    var pct=Math.round(c.amt/total*100);
    html+='<div class="ana-cat-row"><div class="ana-cat-dot" style="background:'+c.color+'"></div><div class="ana-cat-name">'+c.name+'<br><span style="font-size:11px;opacity:0.5">'+c.amt.toFixed(2).replace('.',',')+' \u20ac</span></div><div class="ana-cat-pct">'+pct+' %</div></div>';
  });
  catList.innerHTML=html;
}

function showParents(){
  currentLevel='parent';
  renderBubbles(parentBubbles.map(function(p){return{name:p.name,amt:p.amt,color:p.color,id:p.id,children:p.children}}),function(b){
    if(b.children){showChildren(b)}
  });
  renderCatList(parentBubbles,'Kategorien');
}

function showChildren(parent){
  currentLevel='child';
  var children=parent.children.slice();
  renderBubbles(children,null);
  renderCatList(children,parent.name);
  /* Tap container to go back */
  var backHandler=function(e){
    if(e.target===box||e.target.classList.contains('bubble-container')||e.target.classList.contains('bubble-inner')){
      box.removeEventListener('click',backHandler);
      showParents();
    }
  };

}

function uploadAppBg(inp){if(!inp.files||!inp.files[0])return;var r=new FileReader();r.onload=function(e){customAppBg=e.target.result;var bg=document.querySelector('.bg');bg.style.cssText='position:absolute;inset:0;z-index:0;';bg.style.backgroundImage='url('+customAppBg+')';bg.style.backgroundSize='cover';bg.style.backgroundPosition='center';detectImageBrightness(customAppBg,function(isDark){updateBgTheme(isDark);openSettings();toast('Eigenes Hintergrundbild gesetzt')})};r.readAsDataURL(inp.files[0])}

function updateBgTheme(isDark){
var app=document.querySelector('.app');
app.classList.remove('light-bg','dark-bg');
app.classList.add(isDark?'dark-bg':'light-bg');
}

function detectImageBrightness(src,cb){
var img=new Image();
img.crossOrigin='anonymous';
img.onload=function(){
var c=document.createElement('canvas');
var sz=40;c.width=sz;c.height=sz;
var ctx=c.getContext('2d');
ctx.drawImage(img,0,0,sz,sz);
try{
var d=ctx.getImageData(0,0,sz,sz).data;
var total=0;var count=0;
for(var i=0;i<d.length;i+=16){
total+=(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114);count++}
var avg=total/count;
cb(avg<140);
}catch(e){cb(true)}
};
img.onerror=function(){cb(true)};
img.src=src;
}

var txTarget=null;
function selectContact(i){
txTarget=i;var c=C[i];
closeSheet();
var verb=mode==='send'?'Senden an ':'Empfangen von ';
var h='<div class="ghdr"><div class="back-btn" onclick="closeAmtFS()"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div><div class="gtitle-area"></div></div>';
h+='<div class="amt-header"><div style="display:flex;align-items:flex-start;justify-content:space-between"><div><div class="amt-title">'+verb+c.n+'</div><div class="amt-avail">325,00 \u20ac verf\u00fcgbar</div></div>'+av(c,42,13)+'</div></div>';
h+='<div class="amt-display empty" id="amtDisp">0<span class="amt-eur">\u20ac</span></div>';
h+='<div class="numpad">';
for(var n=1;n<=9;n++)h+='<div class="numpad-key" onclick="numKey(\''+n+'\')">'+n+'</div>';
h+='<div class="numpad-key" onclick="numKey(\',\')">,</div>';
h+='<div class="numpad-key" onclick="numKey(\'0\')">0</div>';
h+='<div class="numpad-key del" onclick="numKey(\'del\')"><svg viewBox="0 0 24 24"><path d="M19 12H5M5 12l5-5M5 12l5 5"/></svg></div>';
h+='</div>';
h+='<button class="amt-confirm '+(mode==='send'?'send':'receive')+'" id="amtBtn" disabled onclick="confirmTx()">'+(mode==='send'?'Senden':'Anfordern')+'</button>';
document.getElementById('amtContent').innerHTML=h;
document.getElementById('amtFS').classList.add('open');
}
function closeAmtFS(){document.getElementById('amtFS').classList.remove('open');amtStr='';txTarget=null;}
var amtStr='';
function numKey(k){
if(k==='del'){amtStr=amtStr.slice(0,-1)}
else if(k===','){if(amtStr.indexOf(',')<0&&amtStr.length>0)amtStr+=','}
else{if(amtStr.indexOf(',')>=0&&amtStr.split(',')[1].length>=2)return;if(amtStr==='0')amtStr=k;else amtStr+=k}
var disp=document.getElementById('amtDisp');
if(amtStr.length===0){disp.className='amt-display empty';disp.innerHTML='0<span class="amt-eur">\u20ac</span>'}
else{disp.className='amt-display';disp.innerHTML=amtStr+'<span class="amt-eur">\u20ac</span>'}
var val=parseFloat(amtStr.replace(',','.'))||0;
document.getElementById('amtBtn').disabled=val<=0;
if(ANIM.numpadPop&&k!=='del'){disp.classList.add('pop');setTimeout(function(){disp.classList.remove('pop')},130)}
}
function confirmTx(){
var val=parseFloat(amtStr.replace(',','.'))||0;
if(val<=0||txTarget===null)return;
var s=mode==='send'?-val:val;
bal=Math.round((bal+s)*100)/100;
TX.unshift({c:txTarget,a:s,d:'Gerade eben'});
if(!CHATS[txTarget])CHATS[txTarget]=[];
CHATS[txTarget].push({type:'tx',amt:s,desc:mode==='send'?'Gesendet':'Empfangen'});
var ci=txTarget;
updBal();render();closeAmtFS();
amtStr='';txTarget=null;
if(ANIM.successCheck){showSuccessCheck();setTimeout(function(){toast((mode==='send'?'Gesendet':'Empfangen')+': '+val.toFixed(2).replace('.',',')+' \u20ac');setTimeout(function(){openChat(ci)},400)},1000)}
else{toast((mode==='send'?'Gesendet':'Empfangen')+': '+val.toFixed(2).replace('.',',')+' \u20ac');setTimeout(function(){openChat(ci)},400)}
}

render();


(function(){
var bgEl=document.querySelector('.bg');
var cs=getComputedStyle(bgEl);
var raw=cs.backgroundImage;
if(raw&&raw!=='none'){defaultBgData=raw.slice(4,-1).replace(/['"]/g,'')}
updateBgTheme(true);
})();
</script>
</body>
</html>
